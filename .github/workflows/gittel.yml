name: gittel-youtube

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more YouTube URLs. Each can be followed by optional "v"/"a" and a
          quality value (e.g. "v 480" or "a 192"). Separate entries with newlines, commas,
          or spaces.
        required: true
        type: string
      output_format:
        description: 'Output format (applied when no per‑URL "v"/"a" is given)'
        required: false
        type: choice
        options:
          - 'mp4 (video)'
          - 'mp3 (audio only)'
        default: 'mp4 (video)'
      video_quality:
        description: 'Max video resolution (720p if nothing is specified)'
        required: false
        type: choice
        options:
          - '2160 (4K)'
          - '1080 (Full HD)'
          - '720 (HD)'
          - '480'
          - '360'
          - 'best'
        default: '720 (HD)'
      audio_quality:
        description: 'Audio bitrate for MP3 downloads'
        required: false
        type: choice
        options:
          - '320'
          - '192'
          - '128'
          - '64'
        default: '320'
      bundle_all:
        description: 'Bundle all downloaded files into a single ZIP archive before splitting'
        type: boolean
        default: false
      upload_method:
        description: 'Upload destination'
        required: true
        type: choice
        options:
          - repo
          - release
          - telegram
        default: repo

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 700
    permissions:
      contents: write
    steps:
      # ── Checkout (includes .github/script/*.py) ─────────
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ── Create temporary working directory ─────────────
      - name: '📁 Create temp working directory'
        id: tempdir
        run: |
          TEMP_DIR=$(mktemp -d -t yt-dlp-XXXXXX)
          echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_OUTPUT
          echo "✅ Created temp dir: $TEMP_DIR"

      # ── Cookies (secret only) ─────────────────────────────
      - name: '🔐 Prepare cookies'
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
            echo "✅ YouTube cookies written from secret."
          else
            echo "ℹ️ No YOUTUBE_COOKIES secret – proceeding without cookies."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      # ── Parse URLs & per‑URL arguments ────────────────────
      - name: '📝 Parse all URLs and per‑URL arguments'
        id: parse
        run: |
          INPUT="${{ github.event.inputs.url }}"
          MODIFIED=$(echo "$INPUT" | tr ',' '\n')
          ENTRIES='[]'
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            [ -z "$line" ] && continue
            tokens=($line)
            i=0
            while [ $i -lt ${#tokens[@]} ]; do
              token="${tokens[$i]}"
              if [[ "$token" =~ ^https?:// ]]; then
                link="$token"
                args=()
                i=$((i+1))
                while [ $i -lt ${#tokens[@]} ]; do
                  next="${tokens[$i]}"
                  [[ "$next" =~ ^https?:// ]] && break
                  args+=("$next")
                  i=$((i+1))
                done
                args_json=$(printf '%s\n' "${args[@]}" | jq -R . | jq -s .)
                entry=$(jq -n --arg link "$link" --argjson args "$args_json" \
                  '{link: $link, args: $args}')
                ENTRIES=$(echo "$ENTRIES" | jq ". + [$entry]")
              else
                i=$((i+1))
              fi
            done
          done <<< "$MODIFIED"
          ENTRIES_JSON=$(echo "$ENTRIES" | jq -c .)
          echo "ENTRIES_JSON=$ENTRIES_JSON" >> $GITHUB_OUTPUT
          IS_ANY_YT=$(echo "$ENTRIES" | jq '[.[].link | test("youtube\\.com/watch\\?v=|youtu\\.be/")] | any')
          echo "IS_ANY_YT=$IS_ANY_YT" >> $GITHUB_OUTPUT
          echo "✅ Parsed $(echo "$ENTRIES" | jq length) entries, any YouTube? $IS_ANY_YT"

      # ── Prepare PATH ──────────────────────────────────────
      - name: '📁 Prepare tool paths'
        if: steps.parse.outputs.IS_ANY_YT == 'true'
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          echo "✅ Tool paths prepared."

      # ── Install tools ─────────────────────────────────────
      - name: '🛠️ Install download tools'
        if: steps.parse.outputs.IS_ANY_YT == 'true'
        run: |
          echo "📥 Installing / updating yt-dlp..."
          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
              -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi
          echo "✅ yt-dlp ready."

          echo "📥 Installing jq, ffmpeg..."
          if ! command -v jq &> /dev/null || ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq ffmpeg
          fi
          echo "✅ jq & ffmpeg ready."

          echo "📥 Installing Deno..."
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
          fi
          echo "✅ Deno ready."

          echo "📥 Installing fallback dependencies (Python + requests)..."
          sudo apt-get install -y -qq python3-pip
          pip3 install --quiet requests
          echo "✅ Fallback dependencies installed."

      # ── Primary download (yt-dlp -j → pick format ID → download) ──
      - name: '⬇️ Primary download (original approach)'
        id: primary_download
        run: |
          set -e
          ENTRIES_JSON='${{ steps.parse.outputs.ENTRIES_JSON }}'
          OUTPUT_FOLDER="${{ steps.tempdir.outputs.TEMP_DIR }}"
          mkdir -p "$OUTPUT_FOLDER"

          # Global defaults from the workflow inputs
          GLOBAL_FORMAT="${{ github.event.inputs.output_format }}"
          GLOBAL_VQ="${{ github.event.inputs.video_quality }}"
          GLOBAL_AQ="${{ github.event.inputs.audio_quality }}"

          # Extract numeric part
          GLOBAL_VQ_NUM=$(echo "$GLOBAL_VQ" | grep -o '[0-9]*' | head -1)
          GLOBAL_AQ_NUM=$(echo "$GLOBAL_AQ" | grep -o '[0-9]*' | head -1)

          # Handle "best" keyword
          if [ "$GLOBAL_VQ" = "best" ]; then GLOBAL_VQ_NUM="max"; fi
          if [ "$GLOBAL_AQ" = "best" ]; then GLOBAL_AQ_NUM="max"; fi

          # Derive the default type/value
          if [ "$GLOBAL_FORMAT" = "mp3 (audio only)" ]; then
            GLOBAL_TYPE="a"
            GLOBAL_VAL="$GLOBAL_AQ_NUM"
          else
            GLOBAL_TYPE="v"
            GLOBAL_VAL="$GLOBAL_VQ_NUM"
          fi
          echo "🌐 Global defaults: type=$GLOBAL_TYPE quality=$GLOBAL_VAL"

          COOKIE_ARGS=""
          [ -f youtube-cookies.txt ] && COOKIE_ARGS="--cookies youtube-cookies.txt"

          FAILED_ENTRIES='[]'
          count=$(echo "$ENTRIES_JSON" | jq length)

          for ((idx=0; idx<count; idx++)); do
            link=$(echo "$ENTRIES_JSON" | jq -r ".[$idx].link")
            args=$(echo "$ENTRIES_JSON" | jq -r ".[$idx].args[]?" 2>/dev/null || true)

            type=""
            val=""
            if [ -n "$args" ]; then
              first=$(echo "$args" | head -1)
              if [ "$first" = "v" ] || [ "$first" = "a" ]; then
                type="$first"
                val=$(echo "$args" | head -2 | tail -1)
              fi
            fi
            if [ -z "$type" ]; then
              type="$GLOBAL_TYPE"
              val="$GLOBAL_VAL"
            fi

            echo "========================================"
            echo "📹 Processing $((idx+1))/$count: $link"
            echo "🔧 Type: $type Quality: $val"

            # ── Get video info as JSON ──
            echo "🔍 Fetching video info..."
            YT_DLP_ARGS="$COOKIE_ARGS --js-runtimes deno --remote-components ejs:npm --no-progress"
            VIDEO_JSON=$(yt-dlp $YT_DLP_ARGS -j "$link" 2>/dev/null) || {
              echo "❌ Failed to fetch video info – queued for fallback"
              FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
              continue
            }

            if [ "$type" = "a" ]; then
              # ── Audio: select from audio-only formats ──
              AUDIO_FORMATS=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec == "none" and .acodec != "none")]')
              if [ "$(echo "$AUDIO_FORMATS" | jq 'length')" -eq 0 ]; then
                echo "❌ No audio-only formats found – queued for fallback"
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
                continue
              fi
              case "$val" in
                max) FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'max_by(.abr // .tbr) | .format_id') ;;
                min) FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'min_by(.abr // .tbr) | .format_id') ;;
                *)
                  BITRATE="$val"
                  BITRATES=$(echo "$AUDIO_FORMATS" | jq '[.[].abr // .tbr] | unique | sort')
                  CHOSEN_BITRATE=$(echo "$BITRATES" | jq --argjson b "$BITRATE" \
                    'map({br:., d:(. - $b | abs)}) | sort_by(.d, .br) | first.br')
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r --argjson br "$CHOSEN_BITRATE" \
                    'map(select((.abr // .tbr) == $br)) | first.format_id')
                  ;;
              esac
              echo "🎵 Selected audio format: $FORMAT_ID (bitrate: ~${CHOSEN_BITRATE:-$val}kbps)"
              echo "⬇️ Downloading audio..."
              if yt-dlp $YT_DLP_ARGS -f "$FORMAT_ID" \
                -o "$OUTPUT_FOLDER/%(title)s-${val}kbps.%(ext)s" "$link"; then
                echo "✅ Audio download success"
              else
                echo "❌ Primary download failed – queued for fallback"
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
              fi
            else
              # ── Video: select from combined formats (vcodec+acodec) ──
              COMBINED=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec != "none" and .acodec != "none")]')
              if [ "$(echo "$COMBINED" | jq 'length')" -eq 0 ]; then
                echo "❌ No combined formats found – queued for fallback"
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
                continue
              fi
              case "$val" in
                max) FORMAT_ID=$(echo "$COMBINED" | jq -r 'max_by(.height, .fps) | .format_id') ;;
                min) FORMAT_ID=$(echo "$COMBINED" | jq -r 'min_by(.height, .fps) | .format_id') ;;
                *)
                  HEIGHT="$val"
                  HEIGHTS=$(echo "$COMBINED" | jq '[.[].height] | unique | sort')
                  CHOSEN_HEIGHT=$(echo "$HEIGHTS" | jq --argjson h "$HEIGHT" \
                    'map({h:., d:(. - $h | abs)}) | sort_by(.d, .h) | first.h')
                  MATCHING=$(echo "$COMBINED" | jq --argjson h "$CHOSEN_HEIGHT" 'map(select(.height == $h))')
                  FORMAT_ID=$(echo "$MATCHING" | jq -r 'max_by(.fps) | .format_id')
                  ;;
              esac
              echo "🎬 Selected video format: $FORMAT_ID (height: ${CHOSEN_HEIGHT:-$val}p)"
              echo "⬇️ Downloading video..."
              if yt-dlp $YT_DLP_ARGS -f "$FORMAT_ID" \
                -o "$OUTPUT_FOLDER/%(title)s-${val}p.%(ext)s" "$link"; then
                echo "✅ Video download success"
              else
                echo "❌ Primary download failed – queued for fallback"
                FAILED_ENTRIES=$(echo "$FAILED_ENTRIES" | jq ". + [{link: \"$link\", type: \"$type\", val: \"$val\"}]")
              fi
            fi
          done

          FAILED_ENTRIES_JSON=$(echo "$FAILED_ENTRIES" | jq -c .)
          echo "FAILED_ENTRIES_JSON=$FAILED_ENTRIES_JSON" >> $GITHUB_OUTPUT
          echo "📊 Primary phase done. Failures: $(echo "$FAILED_ENTRIES" | jq length)"

      # ── Fallback pipelines (Piped → IPv4 → ytmp3.gg → Advanced) ──
      - name: '🔄 Fallback pipelines'
        if: steps.primary_download.outputs.FAILED_ENTRIES_JSON != '[]'
        run: |
          set -e
          FAILED_ENTRIES='${{ steps.primary_download.outputs.FAILED_ENTRIES_JSON }}'
          count=$(echo "$FAILED_ENTRIES" | jq length)
          echo "🔄 Attempting fallback for $count failed entries..."
          OUTPUT_FOLDER="${{ steps.tempdir.outputs.TEMP_DIR }}"

          # Helper for filename suffix
          build_suffix() {
            local type="$1"
            local val="$2"
            if [ "$type" = "a" ]; then
              echo "${val}kbps"
            else
              echo "${val}p"
            fi
          }

          COOKIE_ARGS=""
          [ -f youtube-cookies.txt ] && COOKIE_ARGS="--cookies youtube-cookies.txt"

          # ── Fallback 1: Piped privacy-respecting API ──
          fallback_piped() {
            echo "[fallback] Piped API"
            local url="$1" type="$2" val="$3"
            local vid
            vid=$(echo "$url" | sed -n 's/.*v=\([a-zA-Z0-9_-]\{11\}\).*/\1/p' | head -1)
            if [ -z "$vid" ]; then
              echo "❌ Piped: could not extract video ID from $url"
              return 1
            fi
            echo "📹 Video ID: $vid"

            local instances=()
            local cached=(
              "https://pipedapi.kavin.rocks"
              "https://pipedapi-libre.kavin.rocks"
              "https://pipedapi.adminforge.de"
              "https://pipedapi.syncpundit.com"
            )
            instances+=("${cached[@]}")

            echo "🌐 Fetching official Piped public instance list..."
            local official_json
            official_json=$(curl -s --max-time 10 \
              "https://raw.githubusercontent.com/TeamPiped/Piped/master/public_instances.json" 2>/dev/null)
            if [ -n "$official_json" ]; then
              mapfile -t extra < <(echo "$official_json" | jq -r '.[] | select(.api == true) | .api_url // empty')
              for e in "${extra[@]}"; do
                if [[ ! " ${instances[*]} " =~ " ${e} " ]]; then
                  instances+=("$e")
                fi
              done
              echo "✅ Loaded ${#instances[@]} total unique instances."
            else
              echo "⚠️ Could not fetch official list; using only cached instances."
            fi

            local info="" api_base=""
            for inst in "${instances[@]}"; do
              echo "🔍 Trying instance: $inst"
              info=$(curl -s --max-time 15 "${inst}/streams/${vid}" 2>/dev/null)
              if echo "$info" | jq -e '.videoStreams | length > 0' >/dev/null 2>&1; then
                api_base="$inst"
                echo "✅ Instance $inst responded with valid stream data"
                break
              else
                echo "⚠️ Instance $inst failed"
              fi
            done
            if [ -z "$api_base" ]; then
              echo "❌ Piped: all instances failed"
              return 1
            fi

            local title
            title=$(echo "$info" | jq -r '.title // "video"')
            local safe_title
            safe_title=$(echo "$title" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__*/_/g' | head -c 100)
            local suffix
            suffix=$(build_suffix "$type" "$val")

            if [ "$type" = "a" ]; then
              echo "🎵 Audio-only mode – selecting best audio stream"
              local audio_url
              audio_url=$(echo "$info" | jq -r '.audioStreams | sort_by(-.bitrate) | .[0].url // ""')
              if [ -z "$audio_url" ] || [ "$audio_url" = "null" ]; then
                echo "❌ Piped: no audio stream found"
                return 1
              fi
              local filename="${safe_title}-${suffix}.m4a"
              echo "⬇️ Downloading audio: $filename"
              curl -L --fail --progress-bar --retry 3 --retry-delay 5 \
                -o "${OUTPUT_FOLDER}/${filename}" "$audio_url"
              if [ ! -s "${OUTPUT_FOLDER}/${filename}" ]; then
                echo "❌ Piped: audio download empty"
                return 1
              fi
              echo "✅ Piped audio success"
            else
              echo "🎬 Video mode – target height ≤ ${val}p"
              local video_url video_height
              video_url=$(echo "$info" | jq -r --argjson maxh "$val" \
                '.videoStreams | map(select(.videoOnly == true and .height <= $maxh)) | sort_by(-.height) | .[0].url // ""')
              video_height=$(echo "$info" | jq -r --argjson maxh "$val" \
                '.videoStreams | map(select(.videoOnly == true and .height <= $maxh)) | sort_by(-.height) | .[0].height // 0')
              if [ -z "$video_url" ] || [ "$video_url" = "null" ]; then
                echo "⚠️ No video-only stream ≤ ${val}p; falling back to any video stream"
                video_url=$(echo "$info" | jq -r --argjson maxh "$val" \
                  '.videoStreams | map(select(.height <= $maxh)) | sort_by(-.height) | .[0].url // ""')
                video_height=$(echo "$info" | jq -r --argjson maxh "$val" \
                  '.videoStreams | map(select(.height <= $maxh)) | sort_by(-.height) | .[0].height // 0')
              fi
              local audio_url
              audio_url=$(echo "$info" | jq -r '.audioStreams | sort_by(-.bitrate) | .[0].url // ""')
              if [ -z "$video_url" ] || [ "$video_url" = "null" ]; then
                echo "❌ Piped: no suitable video stream found"
                return 1
              fi
              if [ -z "$audio_url" ] || [ "$audio_url" = "null" ]; then
                echo "❌ Piped: no audio stream found"
                return 1
              fi
              echo "📐 Selected video: ${video_height}p"
              local filename="${safe_title}-${suffix}.mp4"
              local tmp_video="${OUTPUT_FOLDER}/.tmp_${vid}_video"
              local tmp_audio="${OUTPUT_FOLDER}/.tmp_${vid}_audio"
              echo "⬇️ Downloading video stream..."
              curl -L --fail --progress-bar --retry 3 --retry-delay 5 \
                -o "$tmp_video" "$video_url" || { echo "❌ Video download failed"; return 1; }
              echo "⬇️ Downloading audio stream..."
              curl -L --fail --progress-bar --retry 3 --retry-delay 5 \
                -o "$tmp_audio" "$audio_url" || { echo "❌ Audio download failed"; rm -f "$tmp_video"; return 1; }
              echo "🔧 Muxing with ffmpeg..."
              ffmpeg -y -v quiet -i "$tmp_video" -i "$tmp_audio" -c copy "${OUTPUT_FOLDER}/${filename}" 2>/dev/null
              local mux_ok=$?
              rm -f "$tmp_video" "$tmp_audio"
              if [ $mux_ok -ne 0 ] || [ ! -s "${OUTPUT_FOLDER}/${filename}" ]; then
                echo "❌ Piped: ffmpeg mux failed"
                return 1
              fi
              echo "✅ Piped video success"
            fi
          }

          # ── Fallback 2: yt-dlp forced IPv4 + retries ──
          fallback_force_ipv4() {
            echo "[fallback] yt-dlp forced IPv4 + retries"
            local suf=$(build_suffix "$2" "$3")
            local fmt
            if [ "$2" = "a" ]; then
              fmt="ba[format_note*=original]/ba"
            else
              fmt="bv[height<=$3]+(ba[format_note*=original]/ba)"
            fi
            yt-dlp --force-ipv4 --retries 10 --fragment-retries 10 \
              --cookies youtube-cookies.txt \
              --extractor-args "youtube:player_client=default,web_embedded" \
              -f "$fmt" \
              --js-runtimes deno --remote-components ejs:npm --no-progress \
              -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$1"
          }

          # ── Fallback 3: ytmp3.gg API (external script) ──
          fallback_ytmp3_api() {
            echo "[fallback] ytmp3.gg API"
            local type="$2" val="$3"
            FORMAT="mp4"
            QUALITY="720p"
            if [ "$type" = "a" ]; then
              FORMAT="mp3"
              QUALITY="${val:-192}kbps"
            else
              QUALITY="${val:-720}p"
            fi
            local tmp_info
            tmp_info=$(mktemp)
            export TMP_INFO="$tmp_info"
            export FB_URL="$1"
            export FB_FMT="$FORMAT"
            export FB_QUAL="$QUALITY"

            # Call the external script (checked out with the repository)
            python3 .github/script/youtube-downloader-ytmp3gg.py
            local py_exit=$?
            if [ $py_exit -ne 0 ]; then
              echo "❌ Python script failed with exit code $py_exit"
              rm -f "$tmp_info"
              return 1
            fi

            if [ ! -s "$tmp_info" ]; then
              echo "❌ ytmp3.gg: no download info written"
              rm -f "$tmp_info"
              return 1
            fi
            DL_URL=$(python3 -c "import json; print(json.load(open('$tmp_info'))['url'])")
            FILENAME=$(python3 -c "import json; print(json.load(open('$tmp_info'))['filename'])")
            echo "⬇️ Downloading via ytmp3.gg: $FILENAME"
            curl -L --fail --progress-bar --retry 3 --retry-delay 5 \
              -o "$OUTPUT_FOLDER/$FILENAME" "$DL_URL"
            rm -f "$tmp_info"
            if [ ! -s "$OUTPUT_FOLDER/$FILENAME" ]; then
              echo "❌ ytmp3.gg download empty"
              return 1
            fi
            echo "✅ ytmp3.gg success"
          }

          # ── Fallback 4: Advanced yt-dlp (multi-client) ──
          fallback_ytdlp_advanced() {
            echo "[fallback] yt-dlp advanced (web_music+tv+web)"
            local suf=$(build_suffix "$2" "$3")
            local fmt
            if [ "$2" = "a" ]; then
              fmt="ba[format_note*=original]/ba"
            else
              fmt="bv[height<=$3]+(ba[format_note*=original]/ba)"
            fi
            yt-dlp \
              --extractor-args "youtube:player_client=web_music,web,tv,web_embedded" \
              -f "$fmt" \
              --js-runtimes deno --newline --concurrent-fragments 4 \
              $COOKIE_ARGS \
              -o "$OUTPUT_FOLDER/%(title)s-${suf}.%(ext)s" "$1"
          }

          FALLBACKS=( fallback_piped fallback_force_ipv4 fallback_ytmp3_api fallback_ytdlp_advanced )

          # ── Run fallbacks ──
          for ((idx=0; idx<count; idx++)); do
            link=$(echo "$FAILED_ENTRIES" | jq -r ".[$idx].link")
            type=$(echo "$FAILED_ENTRIES" | jq -r ".[$idx].type")
            val=$(echo "$FAILED_ENTRIES" | jq -r ".[$idx].val")
            echo "========================================"
            echo "🔄 Fallback for: $link (type=$type quality=$val)"
            success=false
            for fb in "${FALLBACKS[@]}"; do
              echo "🔹 Trying: $fb"
              if $fb "$link" "$type" "$val"; then
                success=true
                echo "✅ $fb succeeded"
                break
              else
                echo "❌ $fb failed"
              fi
            done
            if [ "$success" = false ]; then
              echo "❌ ALL FALLBACKS FAILED for $link"
            fi
          done
          echo "✅ Fallback phase complete."

      # ── Remux all videos to MP4 (inside TEMP_DIR) ─────────
      - name: '🔧 Remux videos to MP4'
        run: |
          OUTPUT_FOLDER="${{ steps.tempdir.outputs.TEMP_DIR }}"
          echo "🔧 Remuxing video files to MP4 container inside temp..."
          for f in "$OUTPUT_FOLDER"/*; do
            [ -f "$f" ] || continue
            ext="${f##*.}"
            if [ "$ext" = "mp4" ]; then
              echo "✅ Already MP4: $(basename "$f")"
              continue
            fi
            if [[ "$ext" =~ ^(m4a|mp3|ogg|opus)$ ]]; then
              echo "🎵 Skipping audio file: $(basename "$f")"
              continue
            fi
            echo "🔧 Remuxing: $(basename "$f") → mp4"
            output_file="${f%.*}.mp4"
            ffmpeg -y -v quiet -i "$f" -c copy "$output_file" 2>/dev/null
            if [ $? -eq 0 ] && [ -s "$output_file" ]; then
              rm "$f"
              echo "✅ Remuxed: $(basename "$output_file")"
            else
              echo "⚠️ Remux failed for $(basename "$f"), keeping original"
              rm -f "$output_file"
            fi
          done
          echo "✅ Remux phase complete."
          echo "📁 Contents of temp dir:"
          ls -lah "$OUTPUT_FOLDER"

      # ── Move finished files to persistent youtube folder (merge) ──
      - name: '📂 Move finished files to youtube folder'
        run: |
          TEMP_DIR="${{ steps.tempdir.outputs.TEMP_DIR }}"
          FINAL_DIR="youtube"
          mkdir -p "$FINAL_DIR"
          # Move all MP4 files
          mv "$TEMP_DIR"/*.mp4 "$FINAL_DIR"/ 2>/dev/null || true
          # Move audio files (if any)
          mv "$TEMP_DIR"/*.m4a "$FINAL_DIR"/ 2>/dev/null || true
          mv "$TEMP_DIR"/*.mp3 "$FINAL_DIR"/ 2>/dev/null || true
          echo "✅ Files moved to $FINAL_DIR (merged with existing content)"
          echo "📁 Final contents of $FINAL_DIR:"
          ls -lah "$FINAL_DIR"

      # ── Zip all files (supports per‑file and bundled mode) ─
      - name: '📦 Zip all files'
        run: |
          OUTPUT_FOLDER="youtube"
          BUNDLE_ALL="${{ github.event.inputs.bundle_all }}"
          UPLOAD_METHOD="${{ inputs.upload_method }}"

          if [ "$UPLOAD_METHOD" = "repo" ]; then
            METHOD="split_push"
          else
            METHOD="release"
          fi

          if [ "$BUNDLE_ALL" = "true" ]; then
            # ── Bundle mode: one ZIP containing all files ──
            BUNDLE_TMP="bundle_tmp"
            mkdir -p "$BUNDLE_TMP"
            # Move all files from youtube into bundle_tmp
            shopt -s dotglob nullglob
            mv "$OUTPUT_FOLDER"/* "$BUNDLE_TMP"/ 2>/dev/null || true
            shopt -u dotglob nullglob

            if [ -z "$(ls -A "$BUNDLE_TMP" 2>/dev/null)" ]; then
              echo "No files to bundle."
              rm -rf "$BUNDLE_TMP"
              exit 0
            fi

            RAND_BUNDLE=$(tr -dc 'a-z' </dev/urandom | head -c5)
            BUNDLE_ZIP="youtube_bundle_${RAND_BUNDLE}.zip"
            echo "📦 Creating bundle ZIP: $BUNDLE_ZIP"

            if [ "$METHOD" = "release" ]; then
              # Unsplit first, split if > 1950 MB
              (cd "$BUNDLE_TMP" && zip -r "../${OUTPUT_FOLDER}/${BUNDLE_ZIP}" *)
              FULLZIP="${OUTPUT_FOLDER}/${BUNDLE_ZIP}"
              SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 2044723200 ]; then
                echo "Bundle ZIP larger than 1950 MiB, splitting"
                rm "$FULLZIP"
                (cd "$BUNDLE_TMP" && zip -r -s 1950m "../${OUTPUT_FOLDER}/${BUNDLE_ZIP}" *)
              fi
            else
              # split_push: always 99 MB parts
              (cd "$BUNDLE_TMP" && zip -r -s 99m "../${OUTPUT_FOLDER}/${BUNDLE_ZIP}" *)
            fi
            rm -rf "$BUNDLE_TMP"
          else
            # ── Per‑file mode: one ZIP per file ──
            for f in "$OUTPUT_FOLDER"/*; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              echo "🗜️ Zipping: $fname"
              if [ "$METHOD" = "release" ]; then
                zip -j "$OUTPUT_FOLDER/${fname}.zip" "$f"
                FULLZIP="${OUTPUT_FOLDER}/${fname}.zip"
                SIZE=$(stat -c%s "$FULLZIP" 2>/dev/null || echo 0)
                if [ "$SIZE" -gt 2044723200 ]; then
                  echo "ZIP larger than 1950 MiB, splitting"
                  rm "$FULLZIP"
                  zip -j -s 1950m "$OUTPUT_FOLDER/${fname}.zip" "$f"
                fi
              else
                zip -j -s 99m "$OUTPUT_FOLDER/${fname}.zip" "$f"
              fi
              rm "$f"
            done
          fi
          echo "✅ Zip phase complete."
          echo "📁 Final contents of $OUTPUT_FOLDER:"
          ls -lah "$OUTPUT_FOLDER"

      # ── Prepare asset list (for release method) ───────────
      - name: '📋 Prepare asset list'
        run: |
          ls -1 youtube > youtube_assets.txt
          echo "Assets to upload:"
          cat youtube_assets.txt

      # ────────────────────────────────────────────────────────
      # TELEGRAM UPLOAD
      # ────────────────────────────────────────────────────────
      - name: "Upload to Telegram"
        if: inputs.upload_method == 'telegram'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          OUTPUT_DIR="youtube"
          
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN یا TELEGRAM_CHAT_ID تنظیم نشده است"
            exit 1
          fi

          API_URL="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          
          total_files=$(ls -1 "$OUTPUT_DIR" 2>/dev/null | wc -l)
          current=1

          for file in "$OUTPUT_DIR"/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            size=$(stat -c%s "$file" 2>/dev/null || echo "0")
            
            # تبدیل size به MB
            size_mb=$((size / 1048576))
            
            echo "→ ارسال فایل $current/$total_files: $fname ($size_mb MB)..."
            
            # بررسی اندازه برای تلگرام (حداکثر 2GB)
            if [ "$size" -gt 2147483648 ]; then
              echo "⚠️ فایل بیش از 2GB است، تقسیم نمی‌شود. تلگرام حداکثر 2GB پشتیبانی می‌کند"
              current=$((current+1))
              continue
            fi
            
            # ارسال فایل
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -F "chat_id=$TELEGRAM_CHAT_ID" \
              -F "document=@$file" \
              -F "caption=$fname" \
              "${API_URL}/sendDocument")
            
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ فایل $fname ارسال شد"
            else
              echo "❌ خطا در ارسال $fname (HTTP $HTTP_CODE)"
            fi
            
            current=$((current+1))
            
            # تاخیر برای جلوگیری از rate limit
            sleep 1
          done
          
          echo "✅ ارسال به تلگرام تکمیل شد"


      # ── Upload to repository (split_push) ────────────────
      - name: '📤 Commit & Push Changes'
        if: ${{ inputs.upload_method == 'repo' }}
        run: |
          set -e
          OUTPUT_FOLDER="youtube"
          FILE_COUNT=$(ls -1 "$OUTPUT_FOLDER" 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ No files to commit – aborting push."
            exit 1
          fi
          echo "📤 Preparing to commit $FILE_COUNT file(s) from '$OUTPUT_FOLDER'..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000
          git add "$OUTPUT_FOLDER/"
          if git diff --cached --quiet; then
            echo "⚠️ No changes staged – nothing to commit."
            exit 1
          fi
          git diff --cached --stat
          git commit -m "⬇️ YouTube download [skip ci]"
          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "📤 Push attempt $i..."
            git pull --rebase --autostash origin "${{ github.ref_name }}"
            if git push origin "${{ github.ref_name }}"; then
              echo "✅ Push succeeded"
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "⏳ Push rejected, retrying in 3s..."
                sleep 3
              else
                echo "❌ Push failed after $RETRIES attempts"
                exit 1
              fi
            fi
          done
          echo "✅ All files uploaded to the 'youtube' folder."

      # ── Create GitHub Release (release method) ────────────
      - name: '🚀 Create Release and upload assets'
        if: ${{ inputs.upload_method == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT_DIR="youtube"
          if [ ! -s youtube_assets.txt ]; then
            echo "No assets to release."
            exit 0
          fi
          RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)
          TAG="youtube-downloader-${RAND5}"
          echo "Creating release tag: $TAG"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "$TAG" -m "YouTube download release"
          git push origin "$TAG"
          ASSET_ARGS=""
          while IFS= read -r file; do
            ASSET_ARGS="$ASSET_ARGS ${OUTPUT_DIR}/$file"
          done < youtube_assets.txt
          gh release create "$TAG" $ASSET_ARGS \
            --title "youtube-downloader-${RAND5}" \
            --notes "Automated release from YouTube Download workflow." \
            --target "${{ github.ref_name }}"
          echo "Release '$TAG' created with assets."

      # ── Cleanup temporary directory ───────────────────────
      - name: '🧹 Cleanup temp directory'
        if: always()
        run: |
          rm -rf "${{ steps.tempdir.outputs.TEMP_DIR }}" 2>/dev/null || true
          rm -f youtube-cookies.txt 2>/dev/null || true
          echo "✅ Cleanup done."
